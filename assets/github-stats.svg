<svg xmlns="http://www.w3.org/2000/svg" width="480" height="196" viewBox="0 0 480 196" role="img" aria-label="Tariqul Islam Tuhin GitHub statistics">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .num { font-variant-numeric: tabular-nums; }
    .title { fill: #1f2328; font-weight: 600; }
    .sub   { fill: #656d76; }
    .muted { fill: #57606a; }
    .value { fill: #1f2328; font-weight: 600; }
    .rule  { stroke: #d0d7de; }
    @media (prefers-color-scheme: dark) {
      .title, .value { fill: #e6edf3; }
      .sub   { fill: #7d8590; }
      .muted { fill: #8b949e; }
      .rule  { stroke: #30363d; }
    }
  </style>
  <rect width="480" height="196" fill="transparent" />
  <text class="title" x="24" y="40" font-size="17">Tariqul Islam Tuhin</text>
  <text class="sub" x="456" y="40" font-size="12" text-anchor="end">@TariqulislamTuhin</text>
  <line class="rule" x1="24" y1="56" x2="456" y2="56" />
  <line class="rule" x1="240" y1="78" x2="240" y2="182" stroke-opacity="0.6" />
  <text class="muted" x="24" y="100" font-size="13">Total commits</text><text class="value num" x="224" y="100" font-size="16" text-anchor="end">135</text>
    <text class="muted" x="24" y="138" font-size="13">Pull requests</text><text class="value num" x="224" y="138" font-size="16" text-anchor="end">9</text>
    <text class="muted" x="24" y="176" font-size="13">Contributions (1yr)</text><text class="value num" x="224" y="176" font-size="16" text-anchor="end">6,915</text>
  <text class="muted" x="256" y="100" font-size="13">PR reviews</text><text class="value num" x="456" y="100" font-size="16" text-anchor="end">0</text>
    <text class="muted" x="256" y="138" font-size="13">Repos contributed to</text><text class="value num" x="456" y="138" font-size="16" text-anchor="end">2</text>
    <text class="muted" x="256" y="176" font-size="13">Followers</text><text class="value num" x="456" y="176" font-size="16" text-anchor="end">26</text>
</svg>
